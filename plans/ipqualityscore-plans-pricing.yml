    name: monthly_lookups
    type: usage
    metric: lookups
    limit: 1000
    timeFrame: month
    geo: global
    unit: 1
    price: $0
    userMultiplied: false
  - label: Daily Lookups
    name: daily_lookups
    type: usage
    metric: lookups
    limit: 35
