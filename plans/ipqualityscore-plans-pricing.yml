specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: IPQualityScore
providerId: ipqualityscore
created: '2026-06-25'
modified: '2026-06-25'
reconciled: true
tags:
- Fraud Prevention
- IP Reputation
- Proxy Detection
- Email Validation
- Threat Intelligence
- Plans
description: >-
  IPQualityScore publishes transparent self-service plans metered by monthly
  lookups, where each fraud-detection API request (IP, email, phone, URL,
  transaction, leaked-data) consumes one lookup. A Free tier offers 1,000
  lookups/month; paid Startup, SMB Basic, and SMB+ tiers raise lookup volume,
  rate limits, custom rules, and unlock features such as transaction scoring,
  address verification, and residential proxy detection. Enterprise adds device
  fingerprinting, mobile SDK, and dedicated infrastructure with custom pricing.
notes: >-
  Lookup volumes and prices are as published on the IPQualityScore plans page
  and are subject to change; verify against the live page during reconciliation.
  Paid plans are contract-free with prorated upgrades and downgrades.
sources:
- https://www.ipqualityscore.com/plans
- https://www.ipqualityscore.com/documentation/overview
plans:
