principles:
- name: Visibility
  description: Track lookup consumption per API in the IPQS dashboard against the plan's monthly allotment.
- name: Allocation
  description: Use separate API keys and custom rules per workload/team to map lookup spend to cost centers.
- name: Optimization
  description: Use the fast flag and appropriate strictness to avoid wasted lookups; cache stable results; right-size the plan tier to actual monthly lookup volume.
- name: Accountability
  description: Assign owners per key/workload and review monthly lookup burn against the included allotment before the next billing cycle.
