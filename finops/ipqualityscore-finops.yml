meters:
- name: monthly_lookups
  description: Total fraud-detection API requests consumed against the plan's monthly lookup allotment.
  unit: lookups
  aggregation: sum
  dimensions:
  - account
  - api
- name: plan_subscription
  description: Fixed monthly subscription fee for the active plan tier.
  unit: months
  aggregation: sum
  dimensions:
  - account
  - plan
- name: ip_lookups
  description: IP reputation / proxy-VPN-Tor and transaction-scoring requests.
  unit: lookups
  aggregation: sum
  dimensions:
  - account
- name: email_lookups
  description: Email validation requests.
  unit: lookups
  aggregation: sum
  dimensions:
  - account
- name: phone_lookups
  description: Phone validation requests.
  unit: lookups
  aggregation: sum
  dimensions:
  - account
- name: url_lookups
  description: Malicious URL scanner requests.
  unit: lookups
  aggregation: sum
  dimensions:
  - account
- name: leaked_data_lookups
