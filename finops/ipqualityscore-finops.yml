description: >-
  FinOps view of IPQualityScore spend. IPQS bills via fixed monthly plan
  subscriptions (Free, Startup, SMB Basic, SMB+, Enterprise) that each include a
  bundled monthly lookup allotment. Every fraud-detection API request - IP
  reputation, email, phone, URL, transaction scoring, device fingerprint, or
  leaked-data check - consumes one lookup against that allotment, making
  lookup volume the primary cost driver. Higher tiers raise included lookups,
  per-second rate limits, and unlock premium features.
notes: >-
  Plan prices and included lookup volumes are subject to change; verify against
  the IPQualityScore plans page during reconciliation.
